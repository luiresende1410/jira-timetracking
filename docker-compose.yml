services:
  backend:
    build: ./backend
    container_name: timetracking-backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/colaboradores.json:/app/colaboradores.json
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: timetracking-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
